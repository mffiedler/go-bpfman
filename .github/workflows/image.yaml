name: Image

on:
  push:
    branches: [main]

jobs:
  build-bpf:
    uses: ./.github/workflows/build-bpf.yaml

  test:
    needs: build-bpf
    uses: ./.github/workflows/test.yaml

  build-and-push:
    name: Build and push (multiarch)
    runs-on: ubuntu-24.04
    # Gate the registry push on tests passing.
    needs: test
    permissions:
      # Required for keyless cosign signing via the GitHub Actions
      # OIDC token: cosign exchanges this token with sigstore's
      # Fulcio CA for a short-lived signing certificate, signs the
      # pushed image digest, and records the signature plus
      # certificate in the Rekor transparency log.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        # Pinned by SHA (not version tag) so the action's content is
        # immutable: a malicious tag move cannot quietly substitute
        # a different signing binary.  This is the same SHA the
        # upstream Rust bpfman v0.6 image-build workflow uses
        # (sigstore/cosign-installer v3.8.2).
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb

      - name: Build and push multi-arch image
        env:
          # Override the Makefile's host-time default so the version
          # metadata baked into the binary matches the commit being
          # built rather than the runner's wall clock.
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          # MULTIARCH_DOCKERFILE points at the all-Fedora variant
          # so the published image is built end-to-end on Fedora 43,
          # matching Dockerfile.bpf and Dockerfile.bpf.openshift.
          # The bookworm-based Dockerfile.bpfman.multiarch is kept
          # in tree as the default for local development and as a
          # documented alternative; flipping CI back is a one-line
          # workflow edit.
          #
          # EXTRA_GO_LDFLAGS="-s -w" strips the symbol table and
          # DWARF sections from the shipped binary, dropping the
          # image size by roughly 90 MB on the Fedora path (which
          # otherwise inherits a lot of debug info from
          # glibc-static). Local builds leave this empty so
          # bin/bpfman stays debuggable.
          #
          # --metadata-file makes buildx write the published index
          # digest to disk so the subsequent cosign step can sign
          # the immutable digest rather than the mutable :latest
          # tag. The file ends up in $RUNNER_TEMP so it is cleaned
          # up at job teardown.
          make docker-build-bpfman-multiarch \
            MULTIARCH_DOCKERFILE=Dockerfile.bpfman.multiarch.fedora \
            EXTRA_GO_LDFLAGS="-s -w" \
            PLATFORMS=linux/amd64,linux/arm64,linux/ppc64le,linux/s390x \
            PUSH=1 \
            BPFMAN_IMAGE=ttl.sh/frobware/go-bpfman \
            IMAGE_TAG=latest \
            BUILDX_EXTRA_ARGS="--cache-from type=gha --cache-to type=gha,mode=max --metadata-file=${RUNNER_TEMP}/buildx-meta.json"

      - name: Sign published image with cosign
        # Keyless signing via the cosign-sign Make target.  The
        # target reads the index digest from the buildx metadata
        # file produced by the previous step and runs `cosign sign
        # -y <image>@<digest>`.  cosign uses the OIDC token granted
        # by `id-token: write` above to fetch a short-lived
        # certificate from sigstore's Fulcio CA, signs the digest,
        # and uploads the signature plus certificate to the Rekor
        # transparency log.  No long-lived secrets are involved.
        #
        # The same Make target also drives local signing for
        # smoke-testing the supply-chain plumbing without
        # round-tripping through CI; see the cosign-sign comment
        # block in the Makefile for the local invocation.
        #
        # Verifiers can later confirm the image was published by
        # this exact workflow in this exact repository:
        #
        #   cosign verify ttl.sh/frobware/go-bpfman:latest \
        #     --certificate-identity-regexp \
        #       'https://github.com/frobware/go-bpfman/.github/workflows/image\.yaml@.*' \
        #     --certificate-oidc-issuer \
        #       https://token.actions.githubusercontent.com
        run: |
          make cosign-sign \
            BPFMAN_IMAGE=ttl.sh/frobware/go-bpfman \
            BUILDX_METADATA_FILE="${RUNNER_TEMP}/buildx-meta.json"

  verify-image:
    name: Verify image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Verify image metadata
        run: |
          output=$(docker run --rm -e BPFMAN_MODE= ttl.sh/frobware/go-bpfman:latest version)
          echo "$output"
          echo "$output" | grep -q "${{ github.sha }}" || { echo "FAIL: expected git commit ${{ github.sha }}"; exit 1; }
          echo "$output" | grep -q "${{ github.event.head_commit.timestamp }}" || { echo "FAIL: expected build date ${{ github.event.head_commit.timestamp }}"; exit 1; }
          echo "$output" | grep -q "${{ matrix.platform }}" || { echo "FAIL: expected platform ${{ matrix.platform }}"; exit 1; }

      - name: Install cosign
        # Required for the verify step below.  Pinned by SHA to
        # match the build-and-push job and to immunise against
        # malicious tag moves on the action repo.
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb

      - name: Verify cosign signature
        # Closes the loop on the build-and-push job's signing
        # step: assert that a sigstore signature exists on the
        # published image, that it was issued by the GitHub
        # Actions OIDC provider, that the signing identity is
        # this exact workflow file on this exact repository, and
        # crucially that the signature was made by the *current*
        # commit (not some prior run that left a stale signature
        # on the floating :latest tag).
        run: |
          set -euo pipefail
          cosign verify ttl.sh/frobware/go-bpfman:latest \
            --certificate-identity-regexp 'https://github\.com/frobware/go-bpfman/\.github/workflows/image\.yaml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > "${RUNNER_TEMP}/cosign-verify.json"
          actual_sha=$(jq -r '.[0].optional.githubWorkflowSha' "${RUNNER_TEMP}/cosign-verify.json")
          if [ "${actual_sha}" != "${{ github.sha }}" ]; then
            echo "FAIL: signature is from sha=${actual_sha}, expected ${{ github.sha }}" >&2
            jq '.[0].optional' "${RUNNER_TEMP}/cosign-verify.json" >&2
            exit 1
          fi
          echo "Signature verified: githubWorkflowSha=${actual_sha}"
          jq '.[0].optional | {Issuer, Subject, githubWorkflowName, githubWorkflowRef, githubWorkflowSha}' \
            "${RUNNER_TEMP}/cosign-verify.json"

      - name: Inspect attestations
        run: |
          # Provenance and SBOM are attached as separate manifests in
          # the OCI image index. Informational; does not gate.
          docker buildx imagetools inspect \
            ttl.sh/frobware/go-bpfman:latest \
            --format '{{ json .Provenance }}' || true
