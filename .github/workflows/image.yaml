name: Image

on:
  push:
    branches: [main]

jobs:
  build-bpf:
    uses: ./.github/workflows/build-bpf.yaml

  test:
    needs: build-bpf
    uses: ./.github/workflows/test.yaml

  build-and-push:
    name: Build and push (multiarch)
    runs-on: ubuntu-24.04
    # Gate the registry push on tests passing.
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        env:
          # Override the Makefile's host-time default so the version
          # metadata baked into the binary matches the commit being
          # built rather than the runner's wall clock.
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          make docker-build-bpfman-multiarch \
            PLATFORMS=linux/amd64,linux/arm64,linux/ppc64le,linux/s390x \
            PUSH=1 \
            BPFMAN_IMAGE=ttl.sh/frobware/go-bpfman \
            IMAGE_TAG=latest \
            BUILDX_EXTRA_ARGS="--cache-from type=gha --cache-to type=gha,mode=max"

  verify-image:
    name: Verify image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Verify image metadata
        run: |
          output=$(docker run --rm -e BPFMAN_MODE= ttl.sh/frobware/go-bpfman:latest version)
          echo "$output"
          echo "$output" | grep -q "${{ github.sha }}" || { echo "FAIL: expected git commit ${{ github.sha }}"; exit 1; }
          echo "$output" | grep -q "${{ github.event.head_commit.timestamp }}" || { echo "FAIL: expected build date ${{ github.event.head_commit.timestamp }}"; exit 1; }
          echo "$output" | grep -q "${{ matrix.platform }}" || { echo "FAIL: expected platform ${{ matrix.platform }}"; exit 1; }

      - name: Inspect attestations
        run: |
          # Provenance and SBOM are attached as separate manifests in
          # the OCI image index. Informational; does not gate.
          docker buildx imagetools inspect \
            ttl.sh/frobware/go-bpfman:latest \
            --format '{{ json .Provenance }}' || true
