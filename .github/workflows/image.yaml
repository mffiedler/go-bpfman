name: Image

on:
  push:
    branches: [main]

jobs:
  build-bpf:
    uses: ./.github/workflows/build-bpf.yaml

  test:
    needs: build-bpf
    uses: ./.github/workflows/test.yaml

  build-and-push-image:
    name: Build and push multi-arch image
    runs-on: ubuntu-24.04
    needs: [test, build-bpf]
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
            gcc-powerpc64le-linux-gnu libc6-dev-ppc64el-cross \
            gcc-s390x-linux-gnu libc6-dev-s390x-cross

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o

      - name: Cross-compile bpfman for all architectures
        env:
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          declare -A expect_file=(
            [amd64]="x86-64"
            [arm64]="aarch64"
            [ppc64le]="64-bit.*PowerPC"
            [s390x]="IBM S/390"
          )
          for arch in amd64:gcc arm64:aarch64-linux-gnu-gcc ppc64le:powerpc64le-linux-gnu-gcc s390x:s390x-linux-gnu-gcc; do
            goarch="${arch%%:*}"
            cc="${arch##*:}"
            echo "=== Building bpfman for ${goarch} (CC=${cc}) ==="
            CGO_ENABLED=1 GOOS=linux GOARCH="${goarch}" CC="${cc}" make bpfman-compile
            mv bin/bpfman "bin/bpfman-${goarch}"
            file_output=$(file "bin/bpfman-${goarch}")
            echo "${file_output}"
            echo "${file_output}" | grep -qE "${expect_file[${goarch}]}" || { echo "FAIL: binary is not ${goarch}"; exit 1; }
          done
          echo "GIT_COMMIT=${{ github.sha }}"
          echo "BUILD_DATE=${{ github.event.head_commit.timestamp }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare per-platform build contexts
        run: |
          for arch in amd64 arm64 ppc64le s390x; do
            mkdir -p "build-${arch}/bin"
            cp "bin/bpfman-${arch}" "build-${arch}/bin/bpfman"
            chmod +x "build-${arch}/bin/bpfman"
          done

      - name: Build and push amd64
        id: build-amd64
        uses: docker/build-push-action@v6
        with:
          context: build-amd64
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/amd64
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Build and push arm64
        id: build-arm64
        uses: docker/build-push-action@v6
        with:
          context: build-arm64
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/arm64
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Build and push ppc64le
        id: build-ppc64le
        uses: docker/build-push-action@v6
        with:
          context: build-ppc64le
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/ppc64le
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Build and push s390x
        id: build-s390x
        uses: docker/build-push-action@v6
        with:
          context: build-s390x
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/s390x
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ttl.sh/frobware/go-bpfman:latest \
            ttl.sh/frobware/go-bpfman@${{ steps.build-amd64.outputs.digest }} \
            ttl.sh/frobware/go-bpfman@${{ steps.build-arm64.outputs.digest }} \
            ttl.sh/frobware/go-bpfman@${{ steps.build-ppc64le.outputs.digest }} \
            ttl.sh/frobware/go-bpfman@${{ steps.build-s390x.outputs.digest }}

  verify-image:
    name: Verify image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-and-push-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Verify image metadata
        run: |
          output=$(docker run --rm -e BPFMAN_MODE= ttl.sh/frobware/go-bpfman:latest version)
          echo "$output"
          echo "$output" | grep -q "${{ github.sha }}" || { echo "FAIL: expected git commit ${{ github.sha }}"; exit 1; }
          echo "$output" | grep -q "${{ github.event.head_commit.timestamp }}" || { echo "FAIL: expected build date ${{ github.event.head_commit.timestamp }}"; exit 1; }
          echo "$output" | grep -q "${{ matrix.platform }}" || { echo "FAIL: expected platform ${{ matrix.platform }}"; exit 1; }
