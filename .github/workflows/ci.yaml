name: CI

on:
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-vendor:
    name: Check go.mod and vendor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check go.mod and vendor are tidy
        run: |
          go mod tidy
          go mod vendor
          git diff --exit-code

  check-fmt:
    name: Check Go formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check format
        run: make bpfman-fmt && git diff --exit-code

  build:
    name: Build bpfman (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build CI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          target: base
          tags: bpfman-ci:latest
          load: true
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

      - name: Build bpfman binary
        # Explicitly verify that the bpfman binary itself
        # compiles (with the same static-link config the
        # published image uses). `go test ./...` exercises
        # package compilation but not the cmd/bpfman link path,
        # so a build break in main.go would slip through the
        # tests job; this job catches it directly.
        run: docker run --rm -v "$PWD":/src -w /src bpfman-ci:latest make bpfman-build STATIC=1

  tests:
    uses: ./.github/workflows/test.yaml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build CI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          target: base
          tags: bpfman-ci:latest
          load: true
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

      - name: Run lint inside CI container
        # `make lint` depends on bpf-build, so the BPF objects
        # are built fresh inside the container; golangci-lint and
        # its supporting linters (checkmake, hadolint, ShellCheck)
        # are pre-installed in the image via the dnf install
        # block in Dockerfile.ci.
        run: docker run --rm -v "$PWD":/src -w /src bpfman-ci:latest make lint

  # Additional nix-backed sweep: build the flake package and run the
  # full `make lint` via the devshell, which pins checkmake,
  # shellcheck, hadolint, and golangci-lint. This complements the
  # primary `lint` job above rather than replacing it: the existing
  # golangci-lint-action stays the canonical Go-lint gate with its
  # own PR annotations; this job catches Make, shell, and Dockerfile
  # regressions and verifies `nix build .` still produces a working
  # binary.
  #
  # BPF objects come from the bpf-objects nix derivation and are
  # copied into the source tree before `make lint` runs, so Make's
  # bpf-build step sees them as already-built and doesn't try to
  # invoke docker or shell out to clang.
  nix:
    name: Nix lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build flake package
        run: nix build .

      - name: Smoke-test the binary
        run: |
          file result/bin/bpfman
          ./result/bin/bpfman version

      - name: Seed BPF objects from the nix derivation
        run: |
          bpf=$(nix build --no-link --print-out-paths .#bpf-objects)
          cp "$bpf"/dispatcher/*.bpf.o dispatcher/
          cp "$bpf"/e2e/testdata/bpf/*.bpf.o e2e/testdata/bpf/
          touch .bpf-build-stamp

      - name: Run lint
        run: nix develop --command make lint

  test-nsenter-qemu:
    name: Test nsenter QEMU (${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: ppc64le
            pkgs: gcc-powerpc64le-linux-gnu libc6-dev-ppc64el-cross qemu-user-binfmt
          - goarch: s390x
            pkgs: gcc-s390x-linux-gnu libc6-dev-s390x-cross qemu-user-binfmt

    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkgs }}

      - name: Run nsenter tests
        run: make test-nsenter-${{ matrix.goarch }}

  ci-complete:
    name: CI complete
    needs: [check-vendor, check-fmt, build, tests, lint, nix, test-nsenter-qemu]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "Some checks failed"
            exit 1
          fi
          echo "All checks passed"
