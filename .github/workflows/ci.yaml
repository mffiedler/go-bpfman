name: CI

on:
  push:

env:
  DOCKER_BUILD_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false


      - name: Set Go cache date
        run: echo "GO_CACHE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Check go.mod and vendor are tidy
        run: |
          go mod tidy
          go mod vendor
          git diff --exit-code

      - name: Build
        run: make

      - name: Upload BPF objects
        uses: actions/upload-artifact@v6
        with:
          name: bpf-objects
          path: |
            .bpf-build-stamp
            dispatcher/*.bpf.o
            e2e/testdata/*.bpf.o
            e2e/testdata/call_malloc

      - name: Trim Go build cache
        run: find ~/.cache/go-build -type f -mmin +90 -delete

      - name: Save Go cache
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false


      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      # git checkout sets all source file mtimes to "now", which is
      # newer than the artifact timestamps from the build job. Without
      # this touch, Make would consider the objects stale and rebuild
      # them via Docker, defeating the purpose of artifact sharing.
      - name: Touch BPF objects to preserve Make freshness
        run: |
          touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/*.bpf.o e2e/testdata/call_malloc
          chmod +x e2e/testdata/call_malloc

      - name: Check format
        run: make bpfman-fmt && git diff --exit-code

      - name: Run lint
        run: make lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false


      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      # git checkout sets all source file mtimes to "now", which is
      # newer than the artifact timestamps from the build job. Without
      # this touch, Make would consider the objects stale and rebuild
      # them via Docker, defeating the purpose of artifact sharing.
      - name: Touch BPF objects to preserve Make freshness
        run: |
          touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/*.bpf.o e2e/testdata/call_malloc
          chmod +x e2e/testdata/call_malloc

      - name: Unit tests
        run: make test PARALLEL=1

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false


      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      # git checkout sets all source file mtimes to "now", which is
      # newer than the artifact timestamps from the build job. Without
      # this touch, Make would consider the objects stale and rebuild
      # them via Docker, defeating the purpose of artifact sharing.
      - name: Touch BPF objects to preserve Make freshness
        run: |
          touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/*.bpf.o e2e/testdata/call_malloc
          chmod +x e2e/testdata/call_malloc

      - name: E2E tests
        run: make test-e2e PARALLEL=1

  ci-complete:
    needs: [build, lint, test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: CI Complete
        run: echo "CI Complete"
