name: CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev gcc-multilib

      - name: Build
        run: make

      - name: Unit tests
        run: make test PARALLEL=1

      - name: E2E tests
        run: make test-e2e PARALLEL=1
