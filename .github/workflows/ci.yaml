name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILD_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        id: meta
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set Go cache date
        run: echo "GO_CACHE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Check go.mod and vendor are tidy
        run: |
          go mod tidy
          go mod vendor
          git diff --exit-code

      - name: Build
        run: make

      - name: Upload BPF objects
        uses: actions/upload-artifact@v6
        with:
          name: bpf-objects
          path: |
            .bpf-build-stamp
            dispatcher/*.bpf.o
            e2e/testdata/*.bpf.o
            e2e/testdata/call_malloc

      - name: Trim Go build cache
        if: github.ref == 'refs/heads/main'
        run: find ~/.cache/go-build -type f -mmin +90 -delete

      - name: Save Go cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      # git checkout sets all source file mtimes to "now", which is
      # newer than the artifact timestamps from the build job. Without
      # this touch, Make would consider the objects stale and rebuild
      # them via Docker, defeating the purpose of artifact sharing.
      - name: Touch BPF objects to preserve Make freshness
        run: |
          touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/*.bpf.o e2e/testdata/call_malloc
          chmod +x e2e/testdata/call_malloc

      - name: Check format
        run: make bpfman-fmt && git diff --exit-code

      - name: Run lint
        run: make lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: |
          touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/*.bpf.o e2e/testdata/call_malloc
          chmod +x e2e/testdata/call_malloc

      - name: Unit tests
        run: make test PARALLEL=1

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: |
          touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/*.bpf.o e2e/testdata/call_malloc
          chmod +x e2e/testdata/call_malloc

      - name: E2E tests
        run: make test-e2e PARALLEL=1

  ci-complete:
    name: CI complete
    needs: [build, lint, test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: CI complete
        run: echo "All checks passed"

  # Image build jobs below only run on push to main, after all
  # checks pass. On pull_request events they are skipped entirely.

  build-binary:
    name: Build bpfman (${{ matrix.goarch }})
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    needs: ci-complete
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            pkgs: ""
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            pkgs: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          - goarch: ppc64le
            cc: powerpc64le-linux-gnu-gcc
            pkgs: gcc-powerpc64le-linux-gnu libc6-dev-ppc64el-cross
          - goarch: s390x
            cc: s390x-linux-gnu-gcc
            pkgs: gcc-s390x-linux-gnu libc6-dev-s390x-cross

    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilation toolchain
        if: matrix.pkgs != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkgs }}

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o

      - name: Build bpfman
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          BUILD_DATE: ${{ needs.build.outputs.build_date }}
        run: make bpfman-compile

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: bpfman-${{ matrix.goarch }}
          path: bin/bpfman

  build-and-push-image:
    name: Assemble and push multi-arch image
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    needs: build-binary
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download all binaries
        uses: actions/download-artifact@v6
        with:
          pattern: bpfman-*
          path: artifacts

      - name: Prepare per-platform build contexts
        run: |
          for arch in amd64 arm64 ppc64le s390x; do
            mkdir -p "build-${arch}/bin"
            cp "artifacts/bpfman-${arch}/bpfman" "build-${arch}/bin/bpfman"
            chmod +x "build-${arch}/bin/bpfman"
          done

      - name: Build and push amd64
        id: build-amd64
        uses: docker/build-push-action@v6
        with:
          context: build-amd64
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/amd64
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Build and push arm64
        id: build-arm64
        uses: docker/build-push-action@v6
        with:
          context: build-arm64
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/arm64
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Build and push ppc64le
        id: build-ppc64le
        uses: docker/build-push-action@v6
        with:
          context: build-ppc64le
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/ppc64le
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Build and push s390x
        id: build-s390x
        uses: docker/build-push-action@v6
        with:
          context: build-s390x
          file: ./Dockerfile.bpfman.multi-arch
          platforms: linux/s390x
          outputs: type=image,name=ttl.sh/frobware/go-bpfman,push-by-digest=true,push=true

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ttl.sh/frobware/go-bpfman:latest \
            ttl.sh/frobware/go-bpfman@${{ steps.build-amd64.outputs.digest }} \
            ttl.sh/frobware/go-bpfman@${{ steps.build-arm64.outputs.digest }} \
            ttl.sh/frobware/go-bpfman@${{ steps.build-ppc64le.outputs.digest }} \
            ttl.sh/frobware/go-bpfman@${{ steps.build-s390x.outputs.digest }}
