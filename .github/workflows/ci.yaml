name: CI

on:
  push:

jobs:
  build:
    name: Build (Go 1.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev gcc-multilib

      - name: Restore Go module cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-mod-

      - name: Restore Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ github.sha }}
          restore-keys: |
            go-build-

      - name: Build
        run: make

      - name: Upload dispatcher objects
        uses: actions/upload-artifact@v6
        with:
          name: dispatcher-objects
          path: dispatcher/*.bpf.o

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Download dispatcher objects
        uses: actions/download-artifact@v6
        with:
          name: dispatcher-objects
          path: dispatcher/

      - name: Restore Go module cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-mod-

      - name: Restore Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ github.sha }}
          restore-keys: |
            go-build-

      - name: Check format
        run: make bpfman-fmt && git diff --exit-code

      - name: Run lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Download dispatcher objects
        uses: actions/download-artifact@v6
        with:
          name: dispatcher-objects
          path: dispatcher/

      - name: Restore Go module cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-mod-

      - name: Restore Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ github.sha }}
          restore-keys: |
            go-build-

      - name: Unit tests
        run: make test PARALLEL=1

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev gcc-multilib

      - name: Download dispatcher objects
        uses: actions/download-artifact@v6
        with:
          name: dispatcher-objects
          path: dispatcher/

      - name: Restore Go module cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-mod-

      - name: Restore Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ github.sha }}
          restore-keys: |
            go-build-

      - name: E2E tests
        run: make test-e2e PARALLEL=1

  ci-complete:
    needs: [build, lint, test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: CI Complete
        run: echo "CI Complete"
