name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOCKER_BUILD_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"

jobs:
  setup:
    name: Env prep
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Compute build metadata
        id: meta
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  build-bpf:
    name: Build BPF objects (dispatchers + e2e testdata)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Build BPF objects
        run: make bpf-build

      - name: Upload BPF objects
        uses: actions/upload-artifact@v6
        with:
          name: bpf-objects
          path: |
            .bpf-build-stamp
            dispatcher/*.bpf.o
            e2e/testdata/bpf/*.bpf.o

  check-vendor:
    name: Check go.mod and vendor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check go.mod and vendor are tidy
        run: |
          go mod tidy
          go mod vendor
          git diff --exit-code

  check-fmt:
    name: Check Go formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check format
        run: make bpfman-fmt && git diff --exit-code

  build-and-test:
    name: Build and unit test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [build-bpf, setup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set Go cache date
        if: matrix.arch == 'amd64'
        run: echo "GO_CACHE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore Go cache
        if: matrix.arch == 'amd64'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: Build
        env:
          BUILD_DATE: ${{ needs.setup.outputs.build_date }}
        run: make

      - name: Unit tests
        run: make test PARALLEL=1

      - name: Trim Go build cache
        if: matrix.arch == 'amd64' && github.ref == 'refs/heads/main'
        run: find ~/.cache/go-build -type f -mmin +90 -delete

      - name: Save Go cache
        if: matrix.arch == 'amd64' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build-bpf
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - name: Read golangci-lint version from Makefile
        run: echo "LINT_VERSION=$(make -s print-golangci-lint-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: Run lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.LINT_VERSION }}
          args: -v --timeout 5m

  test-e2e:
    name: E2E tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-bpf
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: E2E tests
        run: make test-e2e PARALLEL=1

  test-nsenter-qemu:
    name: Test nsenter QEMU (${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: ppc64le
            pkgs: gcc-powerpc64le-linux-gnu libc6-dev-ppc64el-cross qemu-user-binfmt
          - goarch: s390x
            pkgs: gcc-s390x-linux-gnu libc6-dev-s390x-cross qemu-user-binfmt

    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkgs }}

      - name: Run nsenter tests
        run: make test-nsenter-${{ matrix.goarch }}

  ci-complete:
    name: CI complete
    needs: [check-vendor, check-fmt, build-and-test, lint, test-e2e, test-nsenter-qemu]
    runs-on: ubuntu-latest
    steps:
      - name: CI complete
        run: echo "All checks passed"
