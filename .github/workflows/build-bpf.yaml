name: Build BPF objects

on:
  workflow_call:

env:
  DOCKER_BUILD_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"

jobs:
  build-bpf:
    name: Build BPF objects (dispatchers + e2e testdata)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Build BPF objects
        # CI publishes BPF objects via the hermetic Fedora 43 image
        # rather than the host toolchain so the published artifacts
        # are reproducible across runner image churn. The local
        # default is the host path; CI opts into Docker explicitly.
        run: make bpf-build BPF_BUILD_USE_DOCKER=1

      - name: Upload BPF objects
        uses: actions/upload-artifact@v6
        with:
          name: bpf-objects
          path: |
            .bpf-build-stamp
            dispatcher/*.bpf.o
            e2e/testdata/bpf/*.bpf.o
