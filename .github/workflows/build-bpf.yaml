name: Build BPF objects

on:
  workflow_call:

env:
  DOCKER_BUILD_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"

jobs:
  build-bpf:
    name: Build BPF objects (dispatchers + e2e testdata)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Build BPF objects
        run: make bpf-build

      - name: Upload BPF objects
        uses: actions/upload-artifact@v6
        with:
          name: bpf-objects
          path: |
            .bpf-build-stamp
            dispatcher/*.bpf.o
            e2e/testdata/bpf/*.bpf.o
