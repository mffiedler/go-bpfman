name: Build BPF objects

on:
  workflow_call:

jobs:
  build-bpf:
    name: Build BPF objects (dispatchers + e2e testdata)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install BPF toolchain
        # The BPF compile is `clang -target bpfel`, so the host needs
        # clang + libbpf headers + the Linux UAPI headers (the same
        # set the Nix devShell ships and the Fedora bootstrap script
        # installs). pkg-config + make are already on ubuntu-latest
        # but listed for explicitness.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            linux-libc-dev \
            make \
            pkg-config

      - name: Build BPF objects
        # Debian / Ubuntu put `linux-libc-dev`'s per-arch UAPI
        # headers under /usr/include/$DEB_HOST_MULTIARCH/asm/
        # rather than /usr/include/asm/. The host gcc/clang driver
        # knows about this multiarch convention; clang in `-target
        # bpfel` mode does not, so a bare `clang -target bpfel`
        # cannot resolve `#include <asm/types.h>`. Pass the
        # multiarch path explicitly via BPF_CFLAGS so the BPF
        # compile finds linux/types.h, asm/types.h, etc. Fedora /
        # NixOS hosts have everything under /usr/include/asm/ or
        # the Nix linuxHeaders prefix and don't need this.
        run: |
          arch=$(dpkg-architecture -qDEB_HOST_MULTIARCH)
          make bpf-build BPF_CFLAGS="-I/usr/include/$arch"

      - name: Upload BPF objects
        uses: actions/upload-artifact@v6
        with:
          name: bpf-objects
          path: |
            .bpf-build-stamp
            dispatcher/*.bpf.o
            e2e/testdata/bpf/*.bpf.o
