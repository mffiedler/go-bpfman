name: Tests

on:
  workflow_call:

# Each job is a thin shell over a `make ci-*` target. The
# Makefile recipes are the same ones a developer runs locally
# via `make ci`, so what passes here is what passes locally and
# vice versa. CI_BUILDX_CACHE wires the buildkit layer cache
# into GHA cache; the cache scope is shared across all jobs so
# the dnf install layer warms once and everyone reuses it.

env:
  CI_BUILDX_CACHE: --cache-from type=gha,scope=ci --cache-to type=gha,mode=max,scope=ci

jobs:
  # Unit tests run with RACE=1 only. The race detector only adds
  # checks; nothing passes under RACE=1 that would fail under RACE=0,
  # and the no-kernel surface here means the timing-mask argument
  # that justifies a RACE=0 e2e lane does not apply. The default
  # `make` build and the test-e2e-scripts RACE=0 lane already
  # exercise the non-race link path.
  test:
    name: Unit tests (${{ matrix.arch }}, RACE=1)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: make ci-test RACE=1

  test-e2e:
    name: E2E tests (${{ matrix.arch }}, RACE=${{ matrix.race }}, ISOLATED_RUNTIME=${{ matrix.isolated_runtime }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        race: [1, 0]
        isolated_runtime: [0, 1]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: make ci-test-e2e PARALLEL=1 STRESS_COUNT=5 RACE=${{ matrix.race }} ISOLATED_RUNTIME=${{ matrix.isolated_runtime }}

  # Parallel-mode canary for the e2e suite. Mirrors test-e2e but
  # omits the PARALLEL=1 override so go test runs at GOMAXPROCS,
  # which exercises the suite's intra-binary parallelism (50 of 58
  # tests opt into t.Parallel()). Race detector is off here by
  # design -- race+parallelism is its own beast and the existing
  # test-e2e matrix already gates RACE=1. ISOLATED_RUNTIME=0 keeps
  # this lane on the production-shaped shared-state path so it
  # specifically stresses contention there (the per-test isolated
  # mode is already covered by the serial matrix above). Blocking
  # from day one: a regression here is treated as a real failure,
  # not a canary warning.
  test-e2e-parallel:
    name: E2E tests parallel (${{ matrix.arch }}, RACE=0, ISOLATED_RUNTIME=0)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: make ci-test-e2e STRESS_COUNT=5 RACE=0 ISOLATED_RUNTIME=0

  test-e2e-scripts:
    name: E2E REPL scripts (${{ matrix.arch }}, RACE=${{ matrix.race }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        race: [1, 0]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Install runtime deps
        # iproute2 provides ip and tc for veth/netns setup;
        # iputils-ping drives the packet generation that fires
        # the TCX/TC/XDP counters.
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2 iputils-ping

      - name: Install bpftool
        # linux-tools-generic ships a working bpftool at
        # /usr/lib/linux-tools/<ver>-generic/bpftool. Symlink it
        # directly to /usr/local/bin instead of going through
        # the /usr/sbin/bpftool wrapper: the wrapper dispatches
        # on uname -r and Canonical's
        # linux-tools-<kernel>-azure package ships an empty
        # tools directory on some Azure runner kernels, so
        # wrapper-based access is unreliable.
        run: |
          sudo apt-get install -y --no-install-recommends linux-tools-generic
          bpf_bin=$(ls /usr/lib/linux-tools/*-generic/bpftool | head -n 1)
          sudo ln -sf "$bpf_bin" /usr/local/bin/bpftool
          bpftool version

      - run: make ci-test-e2e-scripts RACE=${{ matrix.race }}
