name: Tests

on:
  workflow_call:

# Each job is a thin shell over a `make ci-*` target. The
# Makefile recipes are the same ones a developer runs locally
# via `make ci`, so what passes here is what passes locally and
# vice versa. CI_BUILDX_CACHE wires the buildkit layer cache
# into GHA cache; the cache scope is shared across all jobs so
# the dnf install layer warms once and everyone reuses it.

env:
  CI_BUILDX_CACHE: --cache-from type=gha,scope=ci --cache-to type=gha,mode=max,scope=ci

jobs:
  test:
    name: Unit tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: make ci-test

  # Stress companion to `test`: default GOMAXPROCS plus -count=10
  # to surface concurrent goroutine races and init-time validators
  # that panic on second registration. The deterministic `test`
  # job above stays the gating signal for logic regressions; this
  # is a separate gate aimed at the bug class that one-shot serial
  # runs cannot catch. amd64-only because the bugs in scope (Go
  # races, package-init re-entry) are not architecture-sensitive.
  # STRESS_COUNT pinned here so a local Makefile tweak cannot
  # silently weaken the CI signal.
  test-stress:
    name: Unit tests (stress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: make ci-test-stress STRESS_COUNT=10

  test-e2e:
    name: E2E tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: make ci-test-e2e

  test-e2e-scripts:
    name: E2E REPL scripts (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Install runtime deps
        # iproute2 provides ip and tc for veth/netns setup;
        # iputils-ping drives the packet generation that fires
        # the TCX/TC/XDP counters.
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2 iputils-ping

      - name: Install bpftool
        # linux-tools-generic ships a working bpftool at
        # /usr/lib/linux-tools/<ver>-generic/bpftool. Symlink it
        # directly to /usr/local/bin instead of going through
        # the /usr/sbin/bpftool wrapper: the wrapper dispatches
        # on uname -r and Canonical's
        # linux-tools-<kernel>-azure package ships an empty
        # tools directory on some Azure runner kernels, so
        # wrapper-based access is unreliable.
        run: |
          sudo apt-get install -y --no-install-recommends linux-tools-generic
          bpf_bin=$(ls /usr/lib/linux-tools/*-generic/bpftool | head -n 1)
          sudo ln -sf "$bpf_bin" /usr/local/bin/bpftool
          bpftool version

      - run: make ci-test-e2e-scripts
