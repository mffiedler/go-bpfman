name: Tests

on:
  workflow_call:

jobs:
  unit-test:
    name: Unit tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set Go cache date
        if: matrix.arch == 'amd64'
        run: echo "GO_CACHE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore Go cache
        if: matrix.arch == 'amd64'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: Unit tests
        run: make test PARALLEL=1 STATIC=1

      - name: Trim Go build cache
        if: matrix.arch == 'amd64' && github.ref == 'refs/heads/main'
        run: find ~/.cache/go-build -type f -mmin +90 -delete

      - name: Save Go cache
        if: matrix.arch == 'amd64' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}

  test-e2e:
    name: E2E tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: E2E tests
        run: make test-e2e PARALLEL=1 STATIC=1

  test-e2e-scripts:
    name: E2E REPL scripts (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: Install iproute2 and iputils-ping
        # iproute2 provides ip and tc for veth and netns setup plus
        # TC dispatcher checks; iputils-ping drives the packet
        # generation that fires the TCX/TC/XDP counters. Both are
        # usually present on ubuntu-latest but we install
        # explicitly so the workflow does not silently depend on
        # the base image.
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2 iputils-ping

      - name: Install bpftool
        # Ubuntu's bpftool packaging for Azure kernels is
        # effectively broken on GitHub-hosted runners: the
        # linux-tools-<kernel>-azure package ships an empty tools
        # directory, so the wrapper in linux-tools-common never
        # finds a binary to dispatch to. Pull a statically linked
        # bpftool straight from the upstream libbpf/bpftool
        # release instead; it runs on any kernel and sidesteps
        # the distro-packaging mess entirely. BPFTOOL_VERSION is
        # the git tag at libbpf/bpftool.
        env:
          BPFTOOL_VERSION: v7.5.0
        run: |
          ARCH=$(dpkg --print-architecture)
          url="https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-${ARCH}.tar.gz"
          curl -sSfL "$url" | sudo tar -C /usr/local/bin -xzf -
          sudo chmod +x /usr/local/bin/bpftool
          bpftool version

      - name: E2E REPL scripts
        run: make test-e2e-scripts STATIC=1
