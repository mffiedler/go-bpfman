name: Tests

on:
  workflow_call:

jobs:
  unit-test:
    name: Unit tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set Go cache date
        if: matrix.arch == 'amd64'
        run: echo "GO_CACHE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore Go cache
        if: matrix.arch == 'amd64'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: Unit tests
        run: make test PARALLEL=1 STATIC=1

      - name: Trim Go build cache
        if: matrix.arch == 'amd64' && github.ref == 'refs/heads/main'
        run: find ~/.cache/go-build -type f -mmin +90 -delete

      - name: Save Go cache
        if: matrix.arch == 'amd64' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}

  test-e2e:
    name: E2E tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: E2E tests
        run: make test-e2e PARALLEL=1 STATIC=1

  test-e2e-scripts:
    name: E2E REPL scripts (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-
            go-${{ runner.os }}-

      - name: Download BPF objects
        uses: actions/download-artifact@v6
        with:
          name: bpf-objects

      - name: Touch BPF objects to preserve Make freshness
        run: touch .bpf-build-stamp dispatcher/*.bpf.o e2e/testdata/bpf/*.bpf.o

      - name: Install script dependencies
        # bpftool inspects counter maps; iproute2 provides ip and tc
        # for veth and netns setup plus TC dispatcher checks;
        # iputils-ping drives the packet generation that fires the
        # TCX/TC/XDP counters.
        #
        # Ubuntu's bpftool wrapper in linux-tools-common looks for
        # /usr/lib/linux-tools/<uname -r>/bpftool, but the Azure
        # kernel's linux-tools package installs the binary under
        # /usr/lib/linux-azure-tools-<kernel>/ instead, so the
        # wrapper keeps complaining "bpftool not found for kernel
        # ..." even after the correct package is installed. Bypass
        # the wrapper by locating the real binary via dpkg -L and
        # symlinking it onto /usr/local/bin, which precedes
        # /usr/bin on PATH.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            "linux-tools-$(uname -r)" \
            iproute2 iputils-ping
          BPFTOOL=$(dpkg -L "linux-tools-$(uname -r)" | grep -E '/bpftool$' | head -1)
          if [ -z "$BPFTOOL" ] || [ ! -x "$BPFTOOL" ]; then
            echo "bpftool binary missing from linux-tools-$(uname -r)" >&2
            dpkg -L "linux-tools-$(uname -r)" >&2
            exit 1
          fi
          sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          bpftool version

      - name: E2E REPL scripts
        run: make test-e2e-scripts STATIC=1
