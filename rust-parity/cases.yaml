# At-a-glance coverage, for gauging remaining work. State is the
# scannable column: `proven` = parity is computed and gated by
# rust-parity/cmd/parity-compare; `not tested` = no parity evidence here yet (the
# remaining work). The not-tested surfaces exist in both implementations;
# `not tested` is about evidence, not whether go-bpfman implements them.
coverage:
  - {area: 'CLI program lifecycle (10 program types)', state: proven, verdict: 'parity; Go ahead on kretprobe/uretprobe'}
  - {area: 'Dispatcher ordering, slot reuse and exhaustion', state: proven, verdict: parity}
  - {area: 'Load/attach flags (metadata, application, global, proceed-on, direction, priority, netns, offset, pid)', state: proven, verdict: 'parity; global 0x and tie-break unclear'}
  - {area: 'Error handling and idempotency', state: proven, verdict: 'parity on failure class; exit codes differ'}
  - {area: '`--map-owner-id` map sharing', state: proven, verdict: 'Go ahead (Rust bug)'}
  - {area: '`--container-pid`', state: proven, verdict: 'Go-only (Rust unsupported)'}
  - {area: 'Image load and `--pull-policy`', state: proven, verdict: parity}
  - {area: 'Image build / inspect / sign', state: 'not tested', verdict: '--'}
  - {area: 'gRPC daemon (`serve`)', state: 'not tested', verdict: '--'}
  - {area: 'CSI driver', state: 'not tested', verdict: '--'}
  - {area: 'Library / embedding API', state: 'not tested', verdict: '--'}

