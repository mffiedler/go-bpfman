# Known differences, rendered as a bullet list.
differences:
  - 'kretprobe / uretprobe: Rust accepts the `kretprobe:` / `uretprobe:` token but loads an entry probe, so no return-probe attachment is made.'
  - '`--map-owner-id`: Rust records the owner but loads a fresh map, so the programs do not share a kernel map (Go does); this is a Rust bug.'
  - '`--container-pid`: implemented in Go, unsupported in Rust.'
  - 'XDP section format: Rust requires bare `SEC("xdp")`; Go also accepts `SEC("xdp/<name>")`.'
  - 'Error exit codes differ for some failure classes, though both fail.'

# Kernel-judged cases. The capture script records each program's
# kernel + bpffs footprint as bpftool sees it (program tag/type, map
# shape, link semantics), for both implementations, under
# outputs/kernel/<case>.<impl>.json. parity-compare diffs Go's footprint
# against Rust's and checks the result against `expect` here, so the
# verdict is computed from kernel state, not asserted. A mismatch
# between the kernel and the declared expectation fails the build.
kernel_cases:
  - {case: xdp,        expect: match}
  - {case: tc,         expect: match}
  - {case: tcx,        expect: match}
  - {case: tracepoint, expect: match}
  - {case: kprobe,     expect: match}
  - {case: kretprobe,  expect: differ, on: ['link[0].retprobe']}
  - {case: uprobe,     expect: match}
  - {case: uretprobe,  expect: differ, on: ['link[0].retprobe']}
  - {case: fentry,     expect: match}
  - {case: fexit,      expect: match}

# Behavioural cases. Each is a captured observation (exit codes, chain
# positions, kernel map sharing as bpftool sees it, ordering determinism
# over repeated runs) under outputs/behaviour/<case>.<impl>.json, diffed
# and judged the same way as the kernel cases. "differ" with `on` lists
# exactly the fields expected to diverge, so any unexpected divergence
# (or a newly-fixed one) fails the build.
behaviour_cases:
  - {case: errors-wrong-kind,     expect: differ, on: ['exit']}
  - {case: errors-missing-object, expect: match}
  - {case: errors-malformed,      expect: differ, on: ['exit']}
  - {case: errors-bad-id,         expect: match}
  - {case: section-format,        expect: differ, on: ['load_exit', 'loaded']}
  - {case: global-prefix,         expect: differ, on: ['prefixed_0x_loaded']}
  - {case: map-owner,             expect: differ, on: ['shares_kernel_map']}
  - {case: container-pid,         expect: differ, on: ['accepted', 'attach_exit']}
  - {case: idempotency,           expect: match}
  - {case: priority-zero,         expect: match}
  - {case: slot-exhaustion,       expect: match}
  - {case: ordering-xdp,          expect: match}
  - {case: tiebreak,              expect: differ, on: ['deterministic', 'distinct_orders']}

