version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/frobware/go-bpfman

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - durationcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused

  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: "github.com/hashicorp/go-multierror"
              desc: "Use errors.Join instead"

    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite

    misspell:
      locale: UK

    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"

  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party
    rules:
      # Generated protobuf files.
      - path: '\.pb\.go$'
        linters:
          - govet
          - staticcheck
          - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
